---
# Deploy RDMA Shared Device Plugin (Cornelis fork with CDI support)
# Uses Cornelis fork of k8s-rdma-shared-dev-plugin advertising cornelis.com/hfi

- name: Verify inventory has at least one control_plane and one worker host
  ansible.builtin.assert:
    that:
      - groups['control_plane'] | default([]) | length > 0
      - groups['workers'] | default([]) | length > 0
    fail_msg: "Inventory must define non-empty 'control_plane' and 'workers' groups. Refusing to deploy RDMA shared device."
  run_once: true

- name: Detect platform type
  shell: |
    if lspci -d 434e:0001 | grep -q .; then
      echo "cn5000"
    else
      echo "unknown"
    fi
  register: platform_detect
  changed_when: false
  delegate_to: "{{ groups['workers'][0] }}"
  run_once: true

- name: Validate platform detection
  assert:
    that:
      - platform_detect.stdout in ['cn5000']
    fail_msg: "No supported Cornelis HFI hardware detected (cn5000)"
  run_once: true

- name: Set platform variable
  set_fact:
    detected_platform: "{{ platform_detect.stdout }}"
  run_once: true

- name: Display detected platform
  debug:
    msg: "Detected platform: {{ detected_platform }}"
  run_once: true

- name: Ensure /tmp/rdma-manifests directory exists on control plane
  ansible.builtin.file:
    path: /tmp/rdma-manifests
    state: directory
    mode: '0755'
  delegate_to: "{{ groups['control_plane'][0] }}"
  run_once: true

- name: Copy Flannel manifest to control plane
  copy:
    src: "{{ playbook_dir }}/../../manifests/cni/kube-flannel.yaml"
    dest: /tmp/rdma-manifests/kube-flannel.yaml
  run_once: true

- name: Deploy vanilla Flannel (ethernet control plane)
  shell: kubectl apply -f /tmp/rdma-manifests/kube-flannel.yaml
  run_once: true
  register: flannel_deploy

- name: Wait for Flannel pods to be ready
  shell: kubectl wait --for=condition=ready pod -l app=flannel -n kube-flannel --timeout=120s
  run_once: true
  retries: 3
  delay: 10

- name: Copy ConfigMap manifest to control plane
  copy:
    src: "{{ playbook_dir }}/../../manifests/device-plugins/rdma-cdi-device-config-{{ detected_platform }}.yaml"
    dest: /tmp/rdma-manifests/rdma-cdi-device-config.yaml
  run_once: true

- name: Copy DaemonSet manifest to control plane
  copy:
    src: "{{ playbook_dir }}/../../manifests/device-plugins/rdma-cdi-device-plugin.yaml"
    dest: /tmp/rdma-manifests/rdma-shared-device-plugin.yaml
  run_once: true

- name: Deploy platform-specific RDMA device plugin ConfigMap
  shell: kubectl apply -f /tmp/rdma-manifests/rdma-cdi-device-config.yaml
  run_once: true
  register: configmap_deploy

- name: Deploy RDMA device plugin DaemonSet
  shell: kubectl apply -f /tmp/rdma-manifests/rdma-shared-device-plugin.yaml
  run_once: true
  register: daemonset_deploy

- name: Wait for RDMA device plugin pods to be ready
  shell: kubectl wait --for=condition=ready pod -l app=rdma-shared-device-plugin -n kube-system --timeout=120s
  run_once: true
  retries: 3
  delay: 10

- name: Verify cornelis.com/hfi resource is advertised on all nodes
  ansible.builtin.shell: |
    kubectl get nodes -o json \
      | jq '[.items[].status.allocatable["cornelis.com/hfi"] // "0" | tonumber] | add'
  register: hfi_total
  changed_when: false
  retries: 12
  delay: 10
  until: hfi_total.stdout | int > 0
  delegate_to: "{{ groups['control_plane'][0] }}"
  run_once: true

- name: Assert at least one cornelis.com/hfi resource was advertised
  ansible.builtin.assert:
    that:
      - hfi_total.stdout | int > 0
    fail_msg: |
      RDMA shared device plugin deployment FAILED: no cornelis.com/hfi resources advertised.
      Check: kubectl get nodes -o json | jq '.items[].status.allocatable'
      Check: kubectl -n kube-system logs ds/cn-rdma-shared-dev-plugin
    success_msg: "cornelis.com/hfi total advertised across cluster: {{ hfi_total.stdout }}"
  run_once: true

- name: Deployment summary
  debug:
    msg:
      - "=== RDMA Shared Device Plugin Deployed ==="
      - "Platform: {{ detected_platform }}"
      - "ConfigMap: rdma-cdi-device-config ({{ detected_platform }})"
      - "Resource: cornelis.com/hfi"
      - "Plugin: cn-rdma-shared-dev-plugin:latest"
  run_once: true
