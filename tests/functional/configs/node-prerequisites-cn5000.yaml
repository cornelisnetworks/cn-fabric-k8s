---
# CN5000 Platform Node Prerequisites Configuration
# Requirements for nodes with Cornelis CN5000 hardware

packages:
  - name: kubelet
    version: "1.28.5"
    required: true
  
  - name: kubeadm
    version: "1.28.5"
    required: true
  
  - name: containerd
    version_constraint: ">=1.6.0"
    version_constraint_cdi: ">=1.7.0"  # For rdma-shared-device workflow
    required: true
  
  - name: kubectl
    required: false

system:
  swap:
    enabled: false
    permanent: true
  
  kernel_modules:
    - name: br_netfilter
      loaded: true
      persistent: true
    
    - name: overlay
      loaded: true
      persistent: true
  
  sysctl:
    - parameter: net.bridge.bridge-nf-call-iptables
      value: 1
      persistent: true
    
    - parameter: net.ipv4.ip_forward
      value: 1
      persistent: true

platform:
  type: cn5000
  
  hardware:
    present: true
    pci_vendor: "1fc1"
    pci_device: "14e4"
  
  drivers:
    - name: hfi1
      available: true
      loaded: true
    
    - name: ib_core
      loaded: true
    
    - name: ib_uverbs
      loaded: true
    
    - name: ib_ipoib
      loaded: true
    
    - name: rdma_cm
      loaded: true
    
    - name: rdma_ucm
      loaded: true
  
  subsystem:
    device_files:
      - path: /dev/infiniband/uverbs0
        exists: true
      
      - path: /dev/infiniband/rdma_cm
        exists: true
    
    commands:
      - cmd: ibstat
        expected_output: "State: Active"

services:
  - name: kubelet
    enabled: true
    running: false
  
  - name: containerd
    enabled: true
    running: true

optional:
  time_sync:
    check: true
    services: [chronyd, systemd-timesyncd, ntpd]
  
  network:
    check: true
    dns_resolution: true
    internet_connectivity: true
  
  resources:
    check: true
    min_cpu_cores: 2
    min_memory_mb: 2048
    min_disk_gb: 20
