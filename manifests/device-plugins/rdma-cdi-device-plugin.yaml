---
# RDMA Shared Device Plugin (Cornelis fork with CDI support)
# Uses Cornelis fork of k8s-rdma-shared-dev-plugin for RDMA over Cornelis OPX/CDI HFI
#
# Purpose:
#   - Expose RDMA devices as Kubernetes extended resources (cornelis.com/hfi)
#   - Expose /dev/infiniband/* device files to pods
#   - Expose /sys (read-only) so /sys/class/infiniband/hfi1_* symlinks resolve
#   - Support up to 64 pods sharing each RDMA device (rdmaHcaMax)
#   - Run with --use-cdi to emit CDI device specs in /var/run/cdi
#
# Prerequisites:
#   - Kubernetes >= 1.26 with device plugin support
#   - RDMA driver loaded with /dev/infiniband/* device files present
#   - Platform-specific ConfigMap deployed (rdma-cdi-device-config-cn5000.yaml)
#
# Usage:
#   kubectl apply -f manifests/device-plugins/rdma-cdi-device-config-cn5000.yaml
#   kubectl apply -f manifests/device-plugins/rdma-cdi-device-plugin.yaml
#
# Pod resource request:
#   resources:
#     limits:
#       cornelis.com/hfi: 1

apiVersion: v1
kind: ServiceAccount
metadata:
  name: rdma-shared-device-plugin
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rdma-shared-device-plugin
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rdma-shared-device-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rdma-shared-device-plugin
subjects:
- kind: ServiceAccount
  name: rdma-shared-device-plugin
  namespace: kube-system

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rdma-shared-device-plugin
  namespace: kube-system
  labels:
    tier: node
    app: rdma-shared-device-plugin
    name: rdma-shared-device-plugin
spec:
  selector:
    matchLabels:
      name: rdma-shared-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        tier: node
        app: rdma-shared-device-plugin
        name: rdma-shared-device-plugin
    spec:
      hostNetwork: true
      tolerations:
      - operator: Exists
        effect: NoSchedule
      - operator: Exists
        effect: NoExecute
      serviceAccountName: rdma-shared-device-plugin
      priorityClassName: system-node-critical
      containers:
      - name: rdma-shared-device-plugin
        image: localhost/cn-rdma-shared-dev-plugin:latest
        imagePullPolicy: Never
        args: ["--use-cdi"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/device-plugins
        - name: plugins-registry
          mountPath: /var/lib/kubelet/plugins_registry
        - name: devfs
          mountPath: /dev
        - name: sysfs
          mountPath: /sys
          readOnly: true
        - name: cdi
          mountPath: /var/run/cdi
        - name: hwdata
          mountPath: /usr/share/hwdata
          readOnly: true
        - name: config
          mountPath: /k8s-rdma-shared-dev-plugin
          readOnly: true
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/kubelet/device-plugins
      - name: plugins-registry
        hostPath:
          path: /var/lib/kubelet/plugins_registry
      - name: devfs
        hostPath:
          path: /dev
      - name: sysfs
        hostPath:
          path: /sys
          type: Directory
      - name: cdi
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      - name: hwdata
        hostPath:
          path: /usr/share/hwdata
          type: Directory
      - name: config
        configMap:
          name: rdma-cdi-device-config
          items:
          - key: config.json
            path: config.json
